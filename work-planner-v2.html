<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新意念计划管理系统 - 云端版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: #e8f5e9;
            border-radius: 20px;
            font-size: 14px;
            color: #2e7d32;
            margin-left: 20px;
        }

        .sync-status.syncing {
            background: #fff3e0;
            color: #ef6c00;
        }

        .sync-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .sync-status.syncing .sync-dot {
            background: #ff9800;
            animation: pulse 0.5s infinite;
        }

        .sync-status.error .sync-dot {
            background: #f44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #555;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .content-area {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-icon {
            font-size: 2.5em;
            opacity: 0.8;
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 1.8em;
            font-weight: 700;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .section-header h2 {
            color: #333;
            font-size: 1.8em;
        }

        .add-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .plan-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .plan-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-left: 5px solid #667eea;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* 临近日期的计划 - 红色高亮 */
        .plan-card.urgent {
            background: linear-gradient(135deg, #fff3e0 0%, #ffebee 100%);
            border-left: 5px solid #ff5722;
            box-shadow: 0 4px 16px rgba(255, 87, 34, 0.35);
        }

        .plan-card.urgent .plan-title {
            color: #d32f2f;
        }

        /* 近期计划 - 黄色高亮 */
        .plan-card.near {
            background: linear-gradient(135deg, #fffde7 0%, #fff8e1 100%);
            border-left: 5px solid #ff9800;
            box-shadow: 0 3px 12px rgba(255, 152, 0, 0.25);
        }

        /* 普通计划 - 绿色 */
        .plan-card.normal {
            background: linear-gradient(135deg, #f1f8e9 0%, #ffffff 100%);
            border-left: 5px solid #4caf50;
        }

        /* 已过期或较远计划 - 灰色 */
        .plan-card.far {
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            border-left: 5px solid #9e9e9e;
            opacity: 0.8;
        }

        .plan-card.from-monthly {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 5px solid #1976d2;
        }

        .plan-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .plan-title {
            font-size: 1.25em;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .plan-meta {
            display: flex;
            gap: 12px;
            color: #666;
            font-size: 0.9em;
            align-items: center;
            flex-wrap: wrap;
        }

        .plan-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 99999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .modal-header h3 {
            color: #333;
            font-size: 1.5em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            padding-bottom: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        /* 柱状图样式 */
        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 250px;
            padding: 20px 0;
            border-bottom: 2px solid #e0e0e0;
        }

        .chart-bar {
            flex: 1;
            max-width: 80px;
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .chart-bar-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            transition: height 0.3s ease;
            position: relative;
            min-width: 50px;
        }

        .chart-bar-value:hover {
            opacity: 0.8;
        }

        .chart-bar-label {
            margin-top: 10px;
            font-size: 12px;
            color: #555;
            text-align: center;
            font-weight: 600;
        }

        .chart-bar-count {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #555;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 新意念计划管理系统 - 云端版</h1>
            <p>
                自动保存到云端，多人实时协作
                <span class="sync-status" id="syncStatus">
                    <span class="sync-dot"></span>
                    <span id="syncText">连接中...</span>
                </span>
            </p>
        </header>


        <div class="tabs">
            <button class="tab active" data-tab="weekly">周计划</button>
            <button class="tab" data-tab="monthly">月计划</button>
            <button class="tab" data-tab="completed">已完结计划</button>
            <button class="tab" data-tab="trash" style="color: #c62828;">🗑️ 回收站 <span id="trashCount" style="display:inline-block; background:#f44336; color:white; border-radius:10px; padding:1px 7px; font-size:12px; margin-left:4px; vertical-align:middle;">0</span></button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-label">周计划</div>
                    <div class="stat-value" id="weeklyCount">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <div class="stat-label">月计划</div>
                    <div class="stat-value" id="monthlyCount">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <div class="stat-label">已完结</div>
                    <div class="stat-value" id="completedCount">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-info">
                    <div class="stat-label">总计</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="section-header">
                <h2 id="sectionTitle">周计划</h2>
                <button class="add-btn" id="addPlanBtn">+ 新增计划</button>
            </div>

            <!-- 全局搜索框 -->
            <div style="margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="searchInput" placeholder="🔍 搜索计划（立项名、工作内容、负责人、票型...）"
                               style="flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                        <button id="clearSearchBtn" style="padding: 12px 20px; background: #f5f5f5; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 14px;">清空</button>
                    </div>
                </div>
                <div id="searchResults" style="margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 8px; display: none;">
                    <span style="color: #1976d2; font-weight: 600;">找到 <span id="searchCount">0</span> 个匹配计划</span>
                </div>
            </div>

            <!-- 状态筛选器（仅周计划显示） -->
            <div id="weeklyStatusFilter" style="display: none; margin-bottom: 25px; padding: 0;">
                <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 16px; background: white; border-radius: 8px; border: 2px solid #e0e0e0; transition: all 0.3s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
                        <input type="checkbox" id="statusPending" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: #9e9e9e;">
                        <span style="font-size: 14px; font-weight: 600; color: #555;">待开始</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 16px; background: white; border-radius: 8px; border: 2px solid #e0e0e0; transition: all 0.3s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
                        <input type="checkbox" id="statusInProgress" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: #4caf50;">
                        <span style="font-size: 14px; font-weight: 600; color: #555;">进行中</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 16px; background: white; border-radius: 8px; border: 2px solid #e0e0e0; transition: all 0.3s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
                        <input type="checkbox" id="statusPaused" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: #ff9800;">
                        <span style="font-size: 14px; font-weight: 600; color: #555;">间断中</span>
                    </label>
                </div>
            </div>

            <!-- 年份筛选器和图表按钮（仅已完结计划显示） -->
            <div id="yearFilter" style="display: none; margin-bottom: 25px; padding: 18px 22px; background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%); border-radius: 12px; border-left: 4px solid #667eea; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);">
                <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 15px; font-weight: 700; color: #333;">📅 按年份筛选:</span>
                        <select id="yearSelect" style="padding: 10px 14px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 14px; background: white; cursor: pointer; transition: border-color 0.3s ease;">
                            <option value="">全部年份</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 15px; font-weight: 700; color: #333;">📆 按月份筛选:</span>
                        <select id="monthSelect" style="padding: 10px 14px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 14px; background: white; cursor: pointer; transition: border-color 0.3s ease;">
                            <option value="">全部月份</option>
                            <option value="1">1月</option>
                            <option value="2">2月</option>
                            <option value="3">3月</option>
                            <option value="4">4月</option>
                            <option value="5">5月</option>
                            <option value="6">6月</option>
                            <option value="7">7月</option>
                            <option value="8">8月</option>
                            <option value="9">9月</option>
                            <option value="10">10月</option>
                            <option value="11">11月</option>
                            <option value="12">12月</option>
                        </select>
                    </div>
                    <button class="add-btn" id="toggleChartBtn" style="padding: 10px 20px;">📊 显示统计图表</button>
                </div>
            </div>

            <!-- 统计图表（仅已完结计划显示，默认隐藏） -->
            <div id="chartContainer" style="display: none; margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 12px;">
                <h3 style="margin-bottom: 15px; color: #333;">已完结计划统计（按立项名）</h3>
                <div id="chartCanvas" style="height: 300px; position: relative;"></div>
                <div id="chartLegend" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>

            <div class="plan-list" id="planList"></div>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div id="deleteConfirmModal" style="display: none; position: fixed; z-index: 999999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55);">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 16px; padding: 36px 32px; width: 360px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); text-align: center;">
            <div style="font-size: 52px; margin-bottom: 16px;">🗑️</div>
            <div style="font-size: 18px; font-weight: 700; color: #333; margin-bottom: 10px;">移入回收站</div>
            <div style="font-size: 14px; color: #777; margin-bottom: 28px; line-height: 1.7;">计划将移入回收站，<br>可在回收站中恢复或永久删除。</div>
            <div style="display: flex; gap: 14px;">
                <button id="deleteCancelBtn" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; font-size: 15px; font-weight: 600; color: #555; cursor: pointer; transition: all 0.2s;">取消</button>
                <button id="deleteConfirmBtn" style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f44336 0%, #c62828 100%); font-size: 15px; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s;">移入回收站</button>
            </div>
        </div>
    </div>

    <!-- 永久删除确认对话框 -->
    <div id="permanentDeleteModal" style="display: none; position: fixed; z-index: 999999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65);">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 16px; padding: 36px 32px; width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); text-align: center;">
            <div style="font-size: 52px; margin-bottom: 16px;">⚠️</div>
            <div style="font-size: 18px; font-weight: 700; color: #b71c1c; margin-bottom: 10px;">永久删除</div>
            <div style="font-size: 14px; color: #777; margin-bottom: 28px; line-height: 1.7;">此操作<strong style="color:#b71c1c;">不可恢复</strong>，<br>计划数据将被彻底删除！<br>确定要永久删除这条计划吗？</div>
            <div style="display: flex; gap: 14px;">
                <button id="permanentDeleteCancelBtn" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; font-size: 15px; font-weight: 600; color: #555; cursor: pointer;">取消</button>
                <button id="permanentDeleteConfirmBtn" style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #b71c1c 0%, #7f0000 100%); font-size: 15px; font-weight: 600; color: white; cursor: pointer;">确认永久删除</button>
            </div>
        </div>
    </div>

    <!-- 恢复确认对话框 -->
    <div id="restoreConfirmModal" style="display: none; position: fixed; z-index: 999999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55);">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 16px; padding: 36px 32px; width: 360px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); text-align: center;">
            <div style="font-size: 52px; margin-bottom: 16px;">↩️</div>
            <div style="font-size: 18px; font-weight: 700; color: #1b5e20; margin-bottom: 10px;">恢复计划</div>

        function initSupabase() {

                url: 'https://cuvkfshykabvwnhrremb.supabase.co',

        function setupRealtime() {
            if (!supabaseClient) return;

            // 设置5秒超时，如果订阅成功则显示已连接
            var timeoutId = setTimeout(function() {
                console.log('实时订阅超时，但数据已加载');
                setSyncStatus('connected', '已连接');
            }, 5000);

            supabaseClient.channel('plans-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' }, function(payload) {
                    console.log('收到实时更新:', payload);
                    loadPlans();
                })
                .subscribe(function(status, err) {
                    if (status === 'SUBSCRIBED') {
                        clearTimeout(timeoutId);
                        console.log('实时订阅成功');
                        setSyncStatus('connected', '已连接');
                    } else if (status === 'CLOSED') {
                        clearTimeout(timeoutId);
                        setSyncStatus('error', '连接断开');
                    } else if (status === 'CHANNEL_ERROR') {
                        clearTimeout(timeoutId);
                        console.error('频道错误:', err);
                        setSyncStatus('error', '连接错误');
                    } else {
                        console.log('订阅状态:', status);
                    }
                }, {
                    timeout: 5000
                });
        }

        function setSyncStatus(status, text) {
            var syncStatus = document.getElementById('syncStatus');
            var syncText = document.getElementById('syncText');
            syncStatus.className = 'sync-status ' + status;
            syncText.textContent = text;
        }

        function loadPlans() {
            if (!supabaseClient) return;

            setSyncStatus('syncing', '同步中...');

            supabaseClient.from('plans')
                .select('*')
                .order('created_at', { ascending: false })
                .then(function(result) {
                    var data = result.data;
                    var error = result.error;

                    if (error) {
                        console.error('加载数据失败:', error);
                        setSyncStatus('error', '同步失败');
                        return;
                    }

                    plans = data.map(function(plan) {
                        return {
                            id: plan.id,
                            type: plan.type,
                            title: plan.title,
                            titleBase: plan.title_base,
                            titleSuffix: plan.title_suffix,
                            content: plan.content,
                            startDate: plan.start_date,
                            endDate: plan.end_date,
                            ticketType: plan.ticket_type,
                            priority: plan.priority,
                            status: plan.status,
                            equipmentStatus: plan.equipment_status || '',
                            responsible: plan.responsible || '',
                            members: plan.members || '',
                            group1Leader: plan.group1_leader || '',
                            group1Members: plan.group1_members || '',
                            group2Leader: plan.group2_leader || '',
                            group2Members: plan.group2_members || '',
                            group3Leader: plan.group3_leader || '',
                            group3Members: plan.group3_members || '',
                            group4Leader: plan.group4_leader || '',
                            group4Members: plan.group4_members || '',
                            group5Leader: plan.group5_leader || '',
                            group5Members: plan.group5_members || '',
                            ticketPersonnel: plan.ticket_personnel || '',
                            fireWorkLeader: plan.fire_work_leader || '',
                            fireWorkExecutor: plan.fire_work_executor || '',
                            fireWorkGuardian: plan.fire_work_guardian || '',
                            isDeleted: plan.is_deleted || false,
                            deletedAt: plan.deleted_at || null,
                            createdAt: plan.created_at,
                            updatedAt: plan.updated_at
                        };
                    });

                    renderPlans();
                    updateStats();
                    setSyncStatus('connected', '已连接');
                    console.log('加载计划:', plans.length, '个');
                });
        }

        function savePlanToCloud(planData) {
            if (!supabaseClient) {
                return Promise.reject(new Error('未连接到数据库'));
            }

            setSyncStatus('syncing', '保存中...');

            var dbData = {
                id: planData.id,
                type: planData.type,
                title: planData.title,
                title_base: planData.titleBase,
                title_suffix: planData.titleSuffix,
                content: planData.content,
                start_date: planData.startDate,
                end_date: planData.endDate,
                ticket_type: planData.ticketType,
                priority: planData.priority,
                status: planData.status,
                equipment_status: planData.equipmentStatus,
                responsible: planData.responsible,
                members: planData.members,
                group1_leader: planData.group1Leader,
                group1_members: planData.group1Members,
                group2_leader: planData.group2Leader,
                group2_members: planData.group2Members,
                group3_leader: planData.group3Leader,
                group3_members: planData.group3Members,
                group4_leader: planData.group4Leader,
                group4_members: planData.group4Members,
                group5_leader: planData.group5Leader,
                group5_members: planData.group5Members,
                ticket_personnel: planData.ticketPersonnel,
                fire_work_leader: planData.fireWorkLeader,
                fire_work_executor: planData.fireWorkExecutor,
                fire_work_guardian: planData.fireWorkGuardian
            };

            return supabaseClient.from('plans')
                .upsert(dbData)
                .select()
                .single()
                .then(function(result) {
                    if (result.error) {
                        throw result.error;
                    }
                    return result.data;
                });
        }

        function deletePlanFromCloud(planId) {
            if (!supabaseClient) {
                return Promise.reject(new Error('未连接到数据库'));
            }

            // 软删除：将计划标记为已删除，移入回收站
            return supabaseClient.from('plans')
                .update({ is_deleted: true, deleted_at: new Date().toISOString() })
                .eq('id', planId)
                .then(function(result) {
                    if (result.error) {
                        throw result.error;
                    }
                });
        }

        function restorePlanFromTrash(planId) {
            if (!supabaseClient) {
                return Promise.reject(new Error('未连接到数据库'));
            }

            return supabaseClient.from('plans')
                .update({ is_deleted: false, deleted_at: null })
                .eq('id', planId)
                .then(function(result) {
                    if (result.error) {
                        throw result.error;
                    }
                });
        }

        function permanentDeletePlan(planId) {
            if (!supabaseClient) {
                return Promise.reject(new Error('未连接到数据库'));
            }

            return supabaseClient.from('plans')
                .delete()
                .eq('id', planId)
                .then(function(result) {
                    if (result.error) {
                        throw result.error;
                    }
                });
        }

        function initEventListeners() {
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });

                    currentTab = tab.dataset.tab;
                    document.getElementById('sectionTitle').textContent = planTypeNames[currentTab];

                    if (currentTab === 'weekly') {
                        addBtn.style.display = 'block';

                    } else if (currentTab === 'monthly') {
                        addBtn.style.display = 'block';

                if (!plan && planId && planId.endsWith('_weekly')) {

                    plan = plans.find(function(p) { return p.id === sourceId; });

                    if (plan) {
                        editingPlanId = sourceId;

                    if (plan.titleBase) {
                        document.getElementById('planTitle').value = plan.titleBase;
                        document.getElementById('planTitleSuffix').value = plan.titleSuffix || '';

                        // 旧数据，尝试从标题中提取补充说明

                        if (match) {

        function renderPlans() {
            var container = document.getElementById('planList');
            var filteredPlans;

            // 获取搜索关键词
            var searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            var searchResultsDiv = document.getElementById('searchResults');

            // 回收站标签：显示已删除的计划
            if (currentTab === 'trash') {
                filteredPlans = plans.filter(function(p) { return p.isDeleted; });

                // 搜索过滤
                if (searchKeyword) {
                    filteredPlans = filteredPlans.filter(function(plan) {
                        var searchText = (plan.title || '') + ' ' + (plan.content || '') + ' ' + (plan.responsible || '');
                        return searchText.toLowerCase().indexOf(searchKeyword) !== -1;
                    });
                    searchResultsDiv.style.display = 'block';
                    document.getElementById('searchCount').textContent = filteredPlans.length;
                } else {
                    searchResultsDiv.style.display = 'none';
                }

                // 按删除时间降序
                filteredPlans.sort(function(a, b) {

                });

                    return '<div class="plan-card far" style="opacity:0.85; position:relative;">' +
                        '<div style="position:absolute; top:12px; right:12px; display:flex; gap:8px;">' +
                        '<button class="action-btn" style="background:linear-gradient(135deg,#43a047,#1b5e20);color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;" onclick="restorePlan(\'' + escapeHtml(plan.id) + '\')" title="恢复计划">↩️ 恢复</button>' +
                        '<button class="action-btn" style="background:linear-gradient(135deg,#b71c1c,#f44336);color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;" onclick="permanentDelete(\'' + escapeHtml(plan.id) + '\')" title="永久删除">🗑️ 永久删除</button>' +
                        '</div>' +
                        '<div style="padding-right:180px;">' +
                        '<div class="plan-title" style="color:#888;">' + escapeHtml(plan.title) +
                        '<span style="margin-left:8px; background:#eeeeee; color:#9e9e9e; padding:2px 8px; border-radius:4px; font-size:11px;">' + typeLabel + '</span>' +
                        '</div>' +
                        '<div class="plan-meta" style="margin-top:6px;">' +
                        '<span style="background:#eeeeee; color:#757575; padding:4px 10px; border-radius:6px; font-size:12px;">📅 ' + formatDateTimeForDisplay(plan.startDate) + ' 至 ' + formatDateTimeForDisplay(plan.endDate) + '</span>' +
                        '<span style="color:#bbb; font-size:12px; margin-left:10px;">🗑️ 删除于 ' + deletedTimeStr + '</span>' +
                        '</div>' +
                        '</div>' +
                        '<div style="margin-top:12px; padding:12px 16px; background:#f5f5f5; border-radius:8px; color:#888; font-size:14px; line-height:1.7;">' + escapeHtml(plan.content) + '</div>' +
                        '</div>';
                }).join('');
                return;
            }

            // 已完结计划标签显示所有已完成的计划
            if (currentTab === 'completed') {
                var selectedYear = document.getElementById('yearSelect').value;
                var selectedMonth = document.getElementById('monthSelect').value;
                filteredPlans = plans.filter(function(p) {
                    if (p.isDeleted) return false;
                    if (p.status !== 'completed') return false;

                    var planDate = new Date(p.endDate);
                    var planYear = planDate.getFullYear();
                    var planMonth = planDate.getMonth() + 1; // getMonth() 返回 0-11

                    // 年份筛选
                    if (selectedYear && selectedYear !== '') {
                        if (planYear !== parseInt(selectedYear)) return false;
                    }

                    // 月份筛选
                    if (selectedMonth && selectedMonth !== '') {
                        if (planMonth !== parseInt(selectedMonth)) return false;
                    }

                    return true;
                });
            } else if (currentTab === 'weekly') {
                // 周计划：根据状态筛选（不包括已完成）
                var statusPending = document.getElementById('statusPending').checked;
                var statusInProgress = document.getElementById('statusInProgress').checked;
                var statusPaused = document.getElementById('statusPaused').checked;

                console.log('周计划筛选条件 - 待开始:', statusPending, '进行中:', statusInProgress, '间断中:', statusPaused);

                filteredPlans = plans.filter(function(p) {
                    if (p.isDeleted) return false;
                    // 首先排除已完成的计划
                    if (p.status === 'completed') return false;

                    // 然后根据类型筛选
                    if (p.type !== currentTab) return false;

                    // 根据选中的状态筛选
                    if (p.status === 'pending' && !statusPending) return false;
                    if (p.status === 'in-progress' && !statusInProgress) return false;
                    if (p.status === 'paused' && !statusPaused) return false;

                    return true;
                });

                console.log('周计划筛选结果数量:', filteredPlans.length);
            } else {
                // 其他标签（月计划）显示对应类型的计划，排除已完成的
                filteredPlans = plans.filter(function(p) {
                    if (p.isDeleted) return false;
                    // 排除已完成的计划
                    if (p.status === 'completed') return false;

                    return p.type === currentTab;
                });
            }

            // 搜索过滤
            if (searchKeyword) {
                var beforeSearchCount = filteredPlans.length;
                filteredPlans = filteredPlans.filter(function(plan) {
                    var searchText = '';

                    // 搜索标题
                    if (plan.title) {
                        searchText += plan.title.toLowerCase();
                    }
                    // 搜索内容
                    if (plan.content) {
                        searchText += ' ' + plan.content.toLowerCase();
                    }
                    // 搜索负责人
                    if (plan.responsible) {
                        searchText += ' ' + plan.responsible.toLowerCase();
                    }
                    // 搜索班员
                    if (plan.members) {
                        searchText += ' ' + plan.members.toLowerCase();
                    }
                    // 搜索票型
                    if (plan.ticketType) {
                        searchText += ' ' + plan.ticketType.toLowerCase();
                    }
                    // 搜索动火票负责人
                    if (plan.fireWorkLeader) {
                        searchText += ' ' + plan.fireWorkLeader.toLowerCase();
                    }
                    // 搜索动火执行人
                    if (plan.fireWorkExecutor) {
                        searchText += ' ' + plan.fireWorkExecutor.toLowerCase();
                    }
                    // 搜索动火监护人
                    if (plan.fireWorkGuardian) {
                        searchText += ' ' + plan.fireWorkGuardian.toLowerCase();
                    }
                    // 搜索办票人员
                    if (plan.ticketPersonnel) {
                        searchText += ' ' + plan.ticketPersonnel.toLowerCase();
                    }
                    // 搜索小组成员
                    for (var i = 1; i <= 5; i++) {
                        var leaderKey = 'group' + i + 'Leader';
                        var membersKey = 'group' + i + 'Members';
                        if (plan[leaderKey]) {
                            searchText += ' ' + plan[leaderKey].toLowerCase();
                        }
                        if (plan[membersKey]) {
                            searchText += ' ' + plan[membersKey].toLowerCase();
                        }
                    }

                    // 匹配关键词
                    return searchText.indexOf(searchKeyword) !== -1;
                });

                // 显示搜索结果统计
                searchResultsDiv.style.display = 'block';
                document.getElementById('searchCount').textContent = filteredPlans.length;
            } else {
                searchResultsDiv.style.display = 'none';
            }

            // 如果是周计划，在周二自动纳入下一周的月计划
            if (currentTab === 'weekly' && isTodayTuesday()) {
                var monthlyPlans = plans.filter(function(p) {
                    return p.type === 'monthly' && isInNextWeek(p.startDate);
                });

                monthlyPlans.forEach(function(monthlyPlan) {
                    // 检查是否已经有对应的周计划（通过标题匹配）
                    var hasWeeklyPlan = filteredPlans.some(function(wp) {
                        return wp.title === monthlyPlan.title && wp.sourceType === 'monthly';
                    });

                    if (!hasWeeklyPlan) {
                        // 创建一个纳入的周计划对象
                        var weeklyPlan = {
                            id: monthlyPlan.id + '_weekly',
                            type: 'weekly',
                            title: monthlyPlan.title,
                            content: monthlyPlan.content,
                            startDate: monthlyPlan.startDate,
                            endDate: monthlyPlan.endDate,
                            priority: monthlyPlan.priority,
                            status: monthlyPlan.status,
                            responsible: monthlyPlan.responsible || '',
                            members: monthlyPlan.members || '',
                            group1Leader: monthlyPlan.group1Leader || '',
                            group1Members: monthlyPlan.group1Members || '',
                            group2Leader: monthlyPlan.group2Leader || '',
                            group2Members: monthlyPlan.group2Members || '',
                            group3Leader: monthlyPlan.group3Leader || '',
                            group3Members: monthlyPlan.group3Members || '',
                            group4Leader: monthlyPlan.group4Leader || '',
                            group4Members: monthlyPlan.group4Members || '',
                            group5Leader: monthlyPlan.group5Leader || '',
                            group5Members: monthlyPlan.group5Members || '',
                            sourceType: 'monthly', // 标记来源
                            sourceId: monthlyPlan.id,
                            createdAt: monthlyPlan.createdAt,
                            updatedAt: monthlyPlan.updatedAt
                        };
                        filteredPlans.push(weeklyPlan);
                    }
                });
            }

            // 按开始时间从近到远排序
            filteredPlans.sort(function(a, b) {
                return new Date(a.startDate) - new Date(b.startDate);
            });

            // 计算每个计划距离今天的天数，并添加样式类
            var now = new Date();
            filteredPlans = filteredPlans.map(function(plan) {
                var startDate = new Date(plan.startDate);
                var diffTime = startDate - now;
                var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // 添加样式类
                if (diffDays <= 0) {
                    plan.urgencyClass = 'urgent'; // 今天或已开始
                } else if (diffDays <= 3) {
                    plan.urgencyClass = 'urgent'; // 3天内
                } else if (diffDays <= 7) {
                    plan.urgencyClass = 'near'; // 一周内
                } else if (diffDays <= 30) {
                    plan.urgencyClass = 'normal'; // 一月内
                } else {
                    plan.urgencyClass = 'far'; // 超过一个月
                }

                return plan;
            });

            if (filteredPlans.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无' + planTypeNames[currentTab] + '，点击"新增计划"开始创建</p></div>';
                return;
            }
            
            container.innerHTML = filteredPlans.map(function(plan) {
                var personnelHtml = '';
                if (plan.responsible) {
                    personnelHtml += '<span style="background: #fff3e0; color: #ef6c00; padding: 6px 14px; border-radius: 8px; font-size: 16px; font-weight: 700; border: 2px solid #ff9800;">👤 负责人: ' + escapeHtml(plan.responsible) + '</span>';
                }
                if (plan.members) {
                    if (personnelHtml) personnelHtml += ' ';
                    personnelHtml += '<span style="background: #f3e5f5; color: #7b1fa2; padding: 6px 14px; border-radius: 8px; font-size: 16px; font-weight: 700; border: 2px solid #9c27b0;">👥 班员: ' + escapeHtml(plan.members) + '</span>';
                }

                // 显示小组信息
                var groupsHtml = '';
                for (var i = 1; i <= 5; i++) {
                    var leaderKey = 'group' + i + 'Leader';
                    var membersKey = 'group' + i + 'Members';

                    if (plan[leaderKey] || plan[membersKey]) {
                        if (groupsHtml) groupsHtml += '<div style="height: 10px;"></div>';
                        var groupText = '<div style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); padding: 12px 16px; border-radius: 10px; border: 2px solid #2196f3;"><span style="font-size: 15px; color: #1976d2; font-weight: 800;">🏷️ 小组' + i + '票</span>';
                        if (plan[leaderKey]) {
                            groupText += '<div style="margin-top: 6px; font-size: 15px; color: #0d47a1; font-weight: 700;">👤 负责人: ' + escapeHtml(plan[leaderKey]) + '</div>';
                        }
                        if (plan[membersKey]) {
                            groupText += '<div style="margin-top: 4px; font-size: 15px; color: #0d47a1; font-weight: 700;">👥 组员: ' + escapeHtml(plan[membersKey]) + '</div>';
                        }
                        groupText += '</div>';
                        groupsHtml += groupText;
                    }
                }

                // 显示票型（突出显示）
                var ticketHtml = '';
                if (plan.ticketType) {
                    ticketHtml = '<span style="margin-left: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">🎫 ' + escapeHtml(plan.ticketType) + '</span>';
                }

                // 显示动火票信息
                var fireWorkHtml = '';
                if (plan.fireWorkLeader || plan.fireWorkExecutor || plan.fireWorkGuardian) {
                    fireWorkHtml = '<div style="margin-top: 12px; padding: 12px; background: linear-gradient(135deg, #fff3e0 0%, #ffebee 100%); border-radius: 8px; border-left: 4px solid #f44336;">';
                    if (plan.fireWorkLeader) {
                        fireWorkHtml += '<div style="margin-bottom: 4px;"><span style="color: #f44336; font-weight: bold;">🔥 动火票负责人:</span> ' + escapeHtml(plan.fireWorkLeader) + '</div>';
                    }
                    if (plan.fireWorkExecutor) {
                        fireWorkHtml += '<div style="margin-bottom: 4px;"><span style="color: #ff9800; font-weight: bold;">⚡ 动火执行人:</span> ' + escapeHtml(plan.fireWorkExecutor) + '</div>';
                    }
                    if (plan.fireWorkGuardian) {
                        fireWorkHtml += '<div><span style="color: #2196f3; font-weight: bold;">🛡️ 动火监护人:</span> ' + escapeHtml(plan.fireWorkGuardian) + '</div>';
                    }
                    fireWorkHtml += '</div>';
                }

                // 显示办票人员信息
                var ticketPersonnelHtml = '';
                if (plan.ticketPersonnel) {
                    ticketPersonnelHtml = '<div style="margin-top: 12px; padding: 12px; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 8px; border-left: 4px solid #9c27b0;">';
                    ticketPersonnelHtml += '<div><span style="color: #9c27b0; font-weight: bold;">📝 办票人员:</span> ' + escapeHtml(plan.ticketPersonnel) + '</div>';
                    ticketPersonnelHtml += '</div>';
                }

                // 来源标记
                var sourceTag = '';
                var cardClass = plan.urgencyClass || 'plan-card';
                if (plan.sourceType === 'monthly') {
                    sourceTag = '<span style="background: #e3f2fd; color: #1976d2; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px;">来自下周月计划</span>';
                    cardClass = 'plan-card from-monthly ' + (plan.urgencyClass || '');
                }

                // 计算剩余天数提示
                var daysBadge = '';
                var startDate = new Date(plan.startDate);
                var diffTime = startDate - new Date();
                var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays <= 0) {
                    daysBadge = '<span style="background: #f44336; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 8px;">进行中/已开始</span>';
                } else if (diffDays <= 3) {
                    daysBadge = '<span style="background: #ff5722; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 8px;">' + diffDays + '天后</span>';
                } else if (diffDays <= 7) {
                    daysBadge = '<span style="background: #ff9800; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; margin-left: 8px;">' + diffDays + '天后</span>';
                } else {
                    daysBadge = '<span style="background: #9e9e9e; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; margin-left: 8px;">' + diffDays + '天后</span>';
                }

                // 在已完结标签页中，不显示"进行中/已开始"，显示实际状态
                // 在其他标签页中，显示所有状态
                var statusBadge = '';
                if (currentTab === 'completed') {
                    // 已完结标签页：只显示非已完成状态
                    if (plan.status && plan.status !== 'completed') {
                        statusBadge = '<span style="margin-left: 8px;">📌 ' + getStatusText(plan.status) + '</span>';
                    }
                } else {
                    // 其他标签页：显示所有状态
                    if (plan.status) {
                        statusBadge = '<span style="margin-left: 8px;">📌 ' + getStatusText(plan.status) + '</span>';
                    }
                }

                // 显示电气设备状态
                var equipmentBadge = '';
                if (plan.equipmentStatus) {
                    equipmentBadge = '<span style="margin-left: 8px;">🔧 ' + getEquipmentStatusText(plan.equipmentStatus) + '</span>';
                }

                return '<div class="' + cardClass + '">' +
                    '<div class="plan-header">' +
                    '<div>' +
                    '<div class="plan-title">' + escapeHtml(plan.title) + sourceTag + daysBadge + ticketHtml + '</div>' +
                    '<div class="plan-meta">' +
                    '<span style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #5568d3;">📅 ' + formatDateTimeForDisplay(plan.startDate) + ' 至 ' + formatDateTimeForDisplay(plan.endDate) + '</span>' +
                    '<span style="margin-left: 10px;">⚠️ ' + getPriorityText(plan.priority) + '</span>' +
                    equipmentBadge +
                    statusBadge +
                    (personnelHtml ? '</div><div class="plan-meta" style="margin-top: 8px;">' + personnelHtml : '') +
                    '</div>' +
                    (groupsHtml ? '<div style="margin-top: 10px; padding: 10px; background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%); border-radius: 8px; border-left: 3px solid #667eea;">' + groupsHtml + '</div>' : '') +
                    '</div>' +
                    '<div class="plan-actions">' +
                    (currentTab === 'completed' ? '' : '<button class="action-btn edit-btn" data-plan-id="' + escapeHtml(plan.id) + '">编辑</button>') +
                    (currentTab === 'completed' ? '' : '<button class="action-btn delete-btn" data-plan-id="' + escapeHtml(plan.id) + '">删除</button>') +
                    '</div>' +
                    '</div>' +
                    '<div style="margin-top: 14px; padding: 16px; background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%); border-radius: 10px; border-left: 5px solid #ffc107; color: #333; line-height: 1.8; font-size: 15px; font-weight: 700;">' + escapeHtml(plan.content) + '</div>' +
                    ticketPersonnelHtml +
                    fireWorkHtml +
                    '</div>';
            }).join('');
        }

        function getPriorityText(priority) {
            var texts = {
                high: '<span style="background: #ff5252; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #ff1744;">高风险</span>',
                medium: '<span style="background: #ff9800; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #f57c00;">中风险</span>',
                low: '<span style="background: #4caf50; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #388e3c;">低风险</span>'
            };
                return texts[priority] || '<span style="background: #9e9e9e; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; border: 1px solid #757575;">普通</span>';
        }

        function getStatusText(status) {
            var texts = {
                pending: '<span style="background: #9e9e9e; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #757575;">待开始</span>',
                'in-progress': '<span style="background: #4caf50; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #388e3c;">进行中</span>',
                paused: '<span style="background: #ff9800; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #f57c00;">间断中</span>',
                completed: '<span style="background: #2196f3; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #1565c0;">已完成</span>'
            };
            return texts[status] || '<span style="background: #9e9e9e; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; border: 1px solid #757575;">未知</span>';
        }

        function getEquipmentStatusText(status) {
            var texts = {
                'none': '<span style="background: #9e9e9e; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #757575;">无设备</span>',
                'not-arrived': '<span style="background: #ff5722; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #d84315;">未到货</span>',
                'pending': '<span style="background: #ff9800; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #f57c00;">待试验</span>',
                'testing': '<span style="background: #2196f3; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #1565c0;">试验中</span>',
                'tested': '<span style="background: #4caf50; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid #388e3c;">已试验</span>'
            };
            return texts[status] || '<span style="background: #9e9e9e; color: white; padding: 4px 11px; border-radius: 8px; font-size: 12px; border: 1px solid #757575;">未知</span>';
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期为 date 输入框需要的格式 (YYYY-MM-DD)
        function formatDateForInput(date) {
            if (!date) return '';
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        // 格式化日期时间为 datetime-local 输入框需要的格式 (YYYY-MM-DDTHH:mm)
        function formatDateTimeForInput(dateTimeStr) {
            if (!dateTimeStr) return '';
            var date = new Date(dateTimeStr);
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            return year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
        }

        // 格式化日期时间用于显示
        function formatDateTimeForDisplay(dateTimeStr) {
            if (!dateTimeStr) return '';
            var date = new Date(dateTimeStr);
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
        }

        // 获取当前周的起始和结束日期
        function getCurrentWeekRange() {
            var now = new Date();
            var day = now.getDay();
            var diff = now.getDate() - day + (day === 0 ? -6 : 1); // 周一作为一周开始
            var monday = new Date(now.setDate(diff));
            monday.setHours(0, 0, 0, 0);

            var sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            return { start: monday, end: sunday };
        }

        // 获取下一周的起始和结束日期（每周二执行）
        function getNextWeekRange() {
            var now = new Date();
            // 先找到本周一
            var day = now.getDay();
            var diff = now.getDate() - day + (day === 0 ? -6 : 1);
            var thisMonday = new Date(now);
            thisMonday.setDate(diff);
            thisMonday.setHours(0, 0, 0, 0);

            // 下一周一是本周一 + 7天
            var nextMonday = new Date(thisMonday);
            nextMonday.setDate(thisMonday.getDate() + 7);

            // 下周日是下周一 + 6天
            var nextSunday = new Date(nextMonday);
            nextSunday.setDate(nextMonday.getDate() + 6);
            nextSunday.setHours(23, 59, 59, 999);

            return { start: nextMonday, end: nextSunday };
        }

        // 检查日期是否在当前周内
        function isInCurrentWeek(dateStr) {
            var weekRange = getCurrentWeekRange();
            var date = new Date(dateStr);
            return date >= weekRange.start && date <= weekRange.end;
        }

        // 检查日期是否在下一周内
        function isInNextWeek(dateStr) {
            var weekRange = getNextWeekRange();
            var date = new Date(dateStr);
            return date >= weekRange.start && date <= weekRange.end;
        }

        // 检查今天是否是周二
        function isTodayTuesday() {
            var now = new Date();
            var dayOfWeek = now.getDay();
            return dayOfWeek === 2;
        }

        // 更新年份筛选器
        function updateYearFilter() {
            var yearSelect = document.getElementById('yearSelect');
            var completedPlans = plans.filter(function(p) { return p.status === 'completed'; });
            var years = [];

            completedPlans.forEach(function(plan) {
                var year = new Date(plan.endDate).getFullYear();
                if (years.indexOf(year) === -1) {
                    years.push(year);
                }
            });

            years.sort(function(a, b) { return b - a; }); // 降序排列

            yearSelect.innerHTML = '<option value="">全部年份</option>';
            years.forEach(function(year) {
                yearSelect.innerHTML += '<option value="' + year + '">' + year + '年</option>';
            });
        }

        // 渲染柱状图
        function renderChart() {
            var chartCanvas = document.getElementById('chartCanvas');
            var chartLegend = document.getElementById('chartLegend');

            var selectedYear = document.getElementById('yearSelect').value;
            var completedPlans = plans.filter(function(p) {
                if (p.status !== 'completed') return false;
                if (selectedYear && selectedYear !== '') {
                    var planYear = new Date(p.endDate).getFullYear();
                    return planYear === parseInt(selectedYear);
                }
                return true;
            });

            // 按立项名分组统计
            var projectStats = {};
            completedPlans.forEach(function(plan) {
                var titleBase = plan.titleBase || plan.title;
                if (!projectStats[titleBase]) {
                    projectStats[titleBase] = 0;
                }
                projectStats[titleBase]++;
            });

            var projects = Object.keys(projectStats);
            var counts = Object.values(projectStats);
            var maxCount = Math.max.apply(null, counts) || 1;

            // 颜色数组
            var colors = [
                '#667eea', '#764ba2', '#f093fb', '#f5576c',
                '#4facfe', '#00f2fe', '#43e97b', '#38f9d7',
                '#fa709a', '#fee140'
            ];

            // 生成柱状图HTML
            var chartHtml = '<div class="chart-container">';
            projects.forEach(function(project, index) {
                var count = projectStats[project];
                var height = (count / maxCount) * 200; // 最大高度200px
                var color = colors[index % colors.length];

                chartHtml += '<div class="chart-bar">' +
                    '<div class="chart-bar-count">' + count + '</div>' +
                    '<div class="chart-bar-value" style="height: ' + height + 'px; background: ' + color + ';"></div>' +
                    '<div class="chart-bar-label">' + project + '</div>' +
                    '</div>';
            });
            chartHtml += '</div>';

            chartCanvas.innerHTML = chartHtml;

            // 生成图例
            var legendHtml = '';
            projects.forEach(function(project, index) {
                var color = colors[index % colors.length];
                var count = projectStats[project];
                legendHtml += '<div class="legend-item">' +
                    '<div class="legend-color" style="background: ' + color + ';"></div>' +
                    '<span>' + project + ': ' + count + '个</span>' +
                    '</div>';
            });
            chartLegend.innerHTML = legendHtml;
        }

        // 暴露函数到全局作用域，供 HTML onclick 使用
        window.openModal = openModal;
        window.deletePlan = deletePlan;
        window.restorePlan = restorePlan;
        window.permanentDelete = permanentDelete;

        console.log('JavaScript 加载完成');
    </script>
</body>
</html>
